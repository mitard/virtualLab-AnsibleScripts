frr version 8.4.4
frr defaults traditional
hostname Pod2-RTR10
log syslog informational
service integrated-vtysh-config
!
ip router-id 10.0.0.10
!
interface ens19
 description toR21
 ip address 10.10.21.10/24
exit
!
interface ens20
 description toR11
 ip address 10.10.11.10/24
 ip ospf network point-to-point
exit
!
interface ens21
 description toR12
 ip address 10.10.12.10/24
 ip ospf network point-to-point
exit
!
interface lo
 description loopacks
 ip address 10.0.0.10/32
 ip address 192.168.10.1/24
exit
!
router ospf
 network 10.0.0.10/32 area 0
 network 10.10.11.0/24 area 0
 network 10.10.12.0/24 area 0
exit
!
