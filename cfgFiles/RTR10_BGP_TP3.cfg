frr version 8.4.4
frr defaults traditional
hostname Pod2-RTR10
log syslog informational
service integrated-vtysh-config
!
ip router-id 10.0.0.10
!
interface ens19
 description toR12
 ip address 10.10.12.10/24
 ip ospf network point-to-point
exit
!
interface ens20
 description toR13
 ip address 10.10.13.10/24
 ip ospf network point-to-point
exit
!
interface ens21
 description toR20
 ip address 10.10.20.10/24
exit
!
interface lo
 description loopbacks
 ip address 10.0.0.10/32
 ip address 192.168.10.1/24
exit
!
router bgp 65510
 no bgp ebgp-requires-policy
 neighbor iBGP peer-group
 neighbor iBGP remote-as 65510
 neighbor iBGP update-source 10.0.0.10
 neighbor 10.0.0.11 peer-group iBGP
 neighbor 10.0.0.12 peer-group iBGP
 neighbor 10.0.0.13 peer-group iBGP
 neighbor 10.10.20.20 remote-as 65520
 !
 address-family ipv4 unicast
  network 192.168.10.0/24
  neighbor iBGP next-hop-self
 exit-address-family
exit
!
router ospf
 network 10.0.0.10/32 area 0
 network 10.10.12.0/24 area 0
 network 10.10.13.0/24 area 0
exit
!
