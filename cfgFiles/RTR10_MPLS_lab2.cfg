frr version 10.6.1
frr defaults traditional
hostname Pod1-RTR10
log syslog informational
service integrated-vtysh-config
!
ip router-id 10.0.0.10
!
vrf mgmt-vrf
exit-vrf
!
interface ens19
 bandwidth 1000
 description toR20
 ip address 10.10.20.10/24
 ip ospf area 0
 ip ospf network point-to-point
 mpls enable
exit
!
interface ens20
 bandwidth 1000
 description toR30
 ip address 10.10.30.10/24
 ip ospf area 0
 ip ospf network point-to-point
 mpls enable
exit
!
interface ens21
 bandwidth 1000
 description toR40
 ip address 10.10.40.10/24
 ip ospf area 0
 ip ospf network point-to-point
 mpls enable
exit
!
interface lo
 description Systeme
 ip address 10.0.0.10/32
 ip ospf area 0
exit
!
router ospf
exit
!
mpls ldp
 !
 address-family ipv4
  discovery transport-address 10.0.0.10
  !
  interface ens19
  exit
  !
  interface ens20
  exit
  !
  interface ens21
  exit
  !
 exit-address-family
 !
exit
!
