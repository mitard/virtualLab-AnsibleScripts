frr version 8.4.4
frr defaults traditional
hostname Pod2-RTR11
log syslog informational
service integrated-vtysh-config
!
ip router-id 10.0.0.11
!
interface ens19
 description toR12
 ip address 10.11.12.11/24
 ip ospf network point-to-point
exit
!
interface ens20
 description toR10
 ip address 10.10.11.11/24
 ip ospf network point-to-point
exit
!
interface lo
 description loopbacks
 ip address 10.0.0.11/32
 ip address 192.168.11.1/24
exit
!
router ospf
 network 10.0.0.11/32 area 0
 network 10.10.11.0/24 area 0
 network 10.11.12.0/24 area 0
exit
!
