frr version 8.4.4
frr defaults traditional
hostname Pod1-RTR11
log syslog informational
service integrated-vtysh-config
!
ip router-id 10.0.0.11
!
interface ens19
 bandwidth 1000
 description toR20
 ip address 10.11.20.11/24
 ip ospf area 0
 ip ospf network point-to-point
exit
!
interface ens20
 bandwidth 1000
 description toR30
 ip address 10.11.30.11/24
 ip ospf area 0
 ip ospf network point-to-point
exit
!
interface ens21
 bandwidth 1000
 description toR40
 ip address 10.11.40.11/24
 ip ospf area 0
 ip ospf network point-to-point
exit
!
interface lo
 description Systeme
 ip address 10.0.0.11/32
 ip ospf area 0
exit
!
router ospf
exit
!
