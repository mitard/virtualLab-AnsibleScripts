frr version 8.4.4
frr defaults traditional
hostname Pod2-RTR12
log syslog informational
service integrated-vtysh-config
!
ip router-id 10.0.0.12
!
interface ens19
 description toR10
 ip address 10.10.12.12/24
 ip ospf network point-to-point
exit
!
interface ens20
 description toR11
 ip address 10.11.12.12/24
 ip ospf network point-to-point
exit
!
interface lo
 description loopback
 ip address 10.0.0.12/32
exit
!
router bgp 65510
 neighbor iBGP peer-group
 neighbor iBGP remote-as 65510
 neighbor iBGP update-source 10.0.0.12
 neighbor 10.0.0.10 peer-group iBGP
 neighbor 10.0.0.11 peer-group iBGP
 neighbor 10.0.0.13 peer-group iBGP
 !
 address-family ipv4 unicast
  neighbor iBGP next-hop-self
 exit-address-family
exit
!
router ospf
 network 10.0.0.12/32 area 0
 network 10.10.12.0/24 area 0
 network 10.11.12.0/24 area 0
exit
!
