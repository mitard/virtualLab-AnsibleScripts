frr version 8.4.4
frr defaults traditional
hostname Pod2-RTR13
log syslog informational
service integrated-vtysh-config
!
ip router-id 10.0.0.13
!
interface ens19
 description toR11
 ip address 10.11.13.13/24
 ip ospf network point-to-point
exit
!
interface ens20
 description toR10
 ip address 10.10.13.13/24
 ip ospf network point-to-point
exit
!
interface lo
 description loopbacks
 ip address 10.0.0.13/32
 ip address 192.168.13.1/24
exit
!
router ospf
 network 10.0.0.0/8 area 0
exit
!
