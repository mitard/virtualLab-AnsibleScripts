frr version 8.4.4
frr defaults traditional
hostname Pod2-RTR13
log syslog informational
service integrated-vtysh-config
!
ip router-id 10.0.0.13
!
interface ens19
 description toR11
 ip address 10.11.13.13/24
 ip ospf area 0
 ip ospf network point-to-point
exit
!
interface ens20
 description toR10
 ip address 10.10.13.13/24
 ip ospf area 0
 ip ospf network point-to-point
exit
!
interface lo
 description loopack
 ip address 10.0.0.13/32
 ip ospf area 0
exit
!
router bgp 65510
 neighbor iBGP peer-group
 neighbor iBGP remote-as 65510
 neighbor iBGP update-source 10.0.0.13
 neighbor 10.0.0.10 peer-group iBGP
 neighbor 10.0.0.11 peer-group iBGP
 neighbor 10.0.0.12 peer-group iBGP
 !
 address-family ipv4 unicast
  neighbor iBGP next-hop-self
 exit-address-family
exit
!
router ospf
exit
!
