frr version 8.4.4
frr defaults traditional
hostname Pod2-RTR20
log syslog informational
service integrated-vtysh-config
!
ip router-id 10.0.0.20
!
interface ens19
 description toR21
 ip address 10.20.21.20/24
 ip ospf network point-to-point
exit
!
interface ens20
 description toR22
 ip address 10.20.22.20/24
 ip ospf network point-to-point
exit
!
interface ens21
 description toR10
 ip address 10.10.20.20/24
exit
!
interface ens22
 description toR11
 ip address 10.11.20.20/24
exit
!
interface lo
 description loopback
 ip address 10.0.0.20/32
exit
!
router bgp 65520
 neighbor iBGP peer-group
 neighbor iBGP remote-as 65520
 neighbor iBGP update-source 10.0.0.20
 neighbor 10.0.0.21 peer-group iBGP
 neighbor 10.0.0.22 peer-group iBGP
 !
 address-family ipv4 unicast
  neighbor iBGP next-hop-self
 exit-address-family
exit
!
router ospf
 network 10.0.0.20/32 area 0
 network 10.20.21.0/24 area 0
 network 10.20.22.0/24 area 0
exit
!
