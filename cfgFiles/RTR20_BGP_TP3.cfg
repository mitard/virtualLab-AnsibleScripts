frr version 8.4.4
frr defaults traditional
hostname Pod2-RTR20
log syslog informational
service integrated-vtysh-config
!
ip router-id 10.0.0.20
!
interface ens19
 description toR10
 ip address 10.10.20.20/24
exit
!
interface ens20
 description toR30
 ip address 10.20.30.20/24
exit
!
interface lo
 description loopback
 ip address 10.0.0.20/32
 ip address 192.168.20.1/24
exit
!
router bgp 65520
 no bgp ebgp-requires-policy
 neighbor 10.10.20.10 remote-as 65510
 neighbor 10.20.30.30 remote-as 65530
 !
 address-family ipv4 unicast
  network 192.168.20.0/24
 exit-address-family
exit
!
