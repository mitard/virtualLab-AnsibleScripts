frr version 8.4.4
frr defaults traditional
hostname Pod1-RTR20
log syslog informational
service integrated-vtysh-config
!
ip router-id 10.0.0.20
!
interface ens19
 bandwidth 1000
 description toR10
 ip address 10.10.20.20/24
 ip ospf area 0
 ip ospf network point-to-point
exit
!
interface ens20
 bandwidth 1000
 description toR11
 ip address 10.11.20.20/24
 ip ospf area 0
 ip ospf network point-to-point
exit
!
interface ens21
 bandwidth 1000
 description toR21
 ip address 10.20.21.20/24
exit
!
interface ens22
 bandwidth 1000
 description toR22
 ip address 10.20.22.20/24
exit
!
interface lo
 description Systeme
 ip address 10.0.0.20/32
 ip ospf area 0
exit
!
router bgp 65010
 no bgp ebgp-requires-policy
 neighbor iBGP peer-group
 neighbor iBGP remote-as 65010
 neighbor iBGP update-source 10.0.0.20
 neighbor 10.0.0.30 peer-group iBGP
 neighbor 10.0.0.40 peer-group iBGP
 neighbor 10.20.21.21 remote-as 65021
 neighbor 10.20.22.22 remote-as 65022
 !
 address-family ipv4 unicast
  neighbor iBGP next-hop-self
 exit-address-family
exit
!
router ospf
exit
!
