frr version 8.4.4
frr defaults traditional
hostname Pod2-RTR21
log syslog informational
service integrated-vtysh-config
!
ip router-id 10.0.0.21
!
interface ens19
 description toR10
 ip address 10.10.21.21/24
exit
!
interface ens20
 description toR22
 ip address 10.21.22.21/24
 ip ospf area 0
 ip ospf network point-to-point
exit
!
interface lo
 description loopback
 ip address 10.0.0.21/32
 ip ospf area 0
exit
!
router bgp 65520
 neighbor 10.0.0.22 remote-as 65520
 neighbor 10.0.0.22 update-source lo
 !
 address-family ipv4 unicast
  neighbor 10.0.0.22 next-hop-self
 exit-address-family
exit
!
router ospf
exit
!
