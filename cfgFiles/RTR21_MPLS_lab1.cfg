frr version 8.4.4
frr defaults traditional
hostname Pod1-RTR21
log syslog informational
service integrated-vtysh-config
!
ip router-id 10.0.0.21
!
interface ens19
 bandwidth 1000
 description toR20
 ip address 10.20.21.21/24
exit
!
interface lo
 description Sous-réseau clients R21
 ip address 192.168.21.1/24
exit
!
router bgp 65021
 no bgp ebgp-requires-policy
 neighbor 10.20.21.20 remote-as 65010
 !
 address-family ipv4 unicast
  network 192.168.21.0/24
 exit-address-family
exit
!
