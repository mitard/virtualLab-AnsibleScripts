frr version 10.6.1
frr defaults traditional
hostname Pod1-RTR21
log syslog informational
service integrated-vtysh-config
!
vrf mgmt-vrf
exit-vrf
!
interface ens19
 description toR20
 ip address 10.20.21.21/24
 ip ospf area 2
 ip ospf network point-to-point
exit
!
interface ens20
 description toR22
 ip address 10.21.22.21/24
 ip ospf area 2
 ip ospf network point-to-point
exit
!
interface lo
 description Adr. système et sous-réseau local simulé
 ip address 10.0.0.21/32
 ip address 10.0.2.1/25
 ip ospf area 2
 shutdown
exit
!
router ospf
 ospf router-id 10.0.0.21
exit
!
