frr version 8.4.4
frr defaults traditional
hostname Pod2-RTR22
log syslog informational
service integrated-vtysh-config
!
ip router-id 10.0.0.22
!
interface ens19
 description toR30
 ip address 10.22.30.22/24
exit
!
interface ens20
 description toR21
 ip address 10.21.22.22/24
 ip ospf area 0
 ip ospf network point-to-point
exit
!
interface lo
 description loopack
 ip address 10.0.0.22/32
 ip ospf area 0
exit
!
router bgp 65520
 no bgp ebgp-requires-policy
 neighbor 10.0.0.21 remote-as 65520
 neighbor 10.0.0.21 update-source lo
 neighbor 10.22.30.30 remote-as 65530
 !
 address-family ipv4 unicast
  neighbor 10.0.0.21 next-hop-self
 exit-address-family
exit
!
router ospf
exit
!
