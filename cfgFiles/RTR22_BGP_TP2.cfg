frr version 8.4.4
frr defaults traditional
hostname Pod2-RTR22
log syslog informational
service integrated-vtysh-config
!
ip router-id 10.0.0.22
!
interface ens19
 description toR20
 ip address 10.20.22.22/24
 ip ospf network point-to-point
exit
!
interface ens20
 description toR21
 ip address 10.21.22.22/24
 ip ospf network point-to-point
exit
!
interface lo
 description loopbacks
 ip address 10.0.0.22/32
 ip address 192.168.22.1/24
exit
!
router bgp 65520
 neighbor iBGP peer-group
 neighbor iBGP remote-as 65520
 neighbor iBGP update-source 10.0.0.22
 neighbor 10.0.0.20 peer-group iBGP
 neighbor 10.0.0.21 peer-group iBGP
 !
 address-family ipv4 unicast
  network 192.168.22.0/24
  neighbor iBGP next-hop-self
 exit-address-family
exit
!
router ospf
 network 10.0.0.0/8 area 0
 network 10.20.22.0/24 area 0
 network 10.21.22.0/24 area 0
exit
!
