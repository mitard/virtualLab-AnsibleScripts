frr version 10.6.1
frr defaults traditional
hostname Pod1-RTR22
log syslog informational
service integrated-vtysh-config
!
ip route 0.0.0.0/0 10.20.22.20
ip router-id 10.0.0.22
!
vrf mgmt-vrf
exit-vrf
!
interface ens19
 bandwidth 1000
 description toR20
 ip address 10.20.22.22/24
exit
!
interface lo
 description Sous-réseau clients R22
 ip address 192.168.22.1/24
exit
!
