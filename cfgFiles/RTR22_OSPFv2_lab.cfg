frr version 10.6.1
frr defaults traditional
hostname Pod1-RTR22
log syslog informational
service integrated-vtysh-config
!
vrf mgmt-vrf
exit-vrf
!
interface ens19
 description toR20
 ip address 10.20.22.22/24
 ip ospf area 2
 ip ospf network point-to-point
exit
!
interface ens20
 description toR21
 ip address 10.21.22.22/24
 ip ospf area 2
 ip ospf network point-to-point
exit
!
interface lo
 description Adr. système et sous-réseau local simulé
 ip address 10.0.0.22/32
 ip address 10.0.2.129/25
 ip ospf area 2
exit
!
router ospf
 ospf router-id 10.0.0.22
exit
!
