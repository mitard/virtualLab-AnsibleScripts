frr version 8.4.4
frr defaults traditional
hostname Pod2-RTR30
log syslog informational
service integrated-vtysh-config
!
ip router-id 10.0.0.30
!
interface ens19
 description toR40
 ip address 10.30.40.30/24
exit
!
interface ens20
 description toR20
 ip address 10.20.30.30/24
exit
!
interface lo
 description loopacks
 ip address 10.0.0.30/32
 ip address 192.168.30.1/24
exit
!
router bgp 65530
 no bgp ebgp-requires-policy
 neighbor 10.20.30.20 remote-as 65520
 neighbor 10.30.40.40 remote-as 65540
 !
 address-family ipv4 unicast
  network 192.168.30.0/24
 exit-address-family
exit
!
