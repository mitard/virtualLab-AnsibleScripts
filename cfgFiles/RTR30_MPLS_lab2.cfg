frr version 10.6.1
frr defaults traditional
hostname Pod1-RTR30
log syslog informational
service integrated-vtysh-config
!
ip router-id 10.0.0.30
!
vrf mgmt-vrf
exit-vrf
!
vrf orange
exit-vrf
!
vrf rose
exit-vrf
!
interface ens19
 bandwidth 1000
 description toR10
 ip address 10.10.30.30/24
 ip ospf area 0
 ip ospf network point-to-point
 mpls enable
exit
!
interface ens20
 bandwidth 1000
 description toR11
 ip address 10.11.30.30/24
 ip ospf area 0
 ip ospf network point-to-point
 mpls enable
exit
!
interface ens21
 bandwidth 1000
 description toR31
 ip address 10.30.31.30/24
exit
!
interface ens22
 bandwidth 1000
 description toR32
 ip address 10.30.32.30/24
exit
!
interface lo
 description Systeme
 ip address 10.0.0.30/32
 ip ospf area 0
exit
!
router bgp 65010
 no bgp enforce-first-as
 neighbor iBGP peer-group
 neighbor iBGP remote-as 65010
 neighbor iBGP update-source 10.0.0.30
 neighbor 10.0.0.20 peer-group iBGP
 neighbor 10.0.0.40 peer-group iBGP
 !
 address-family ipv4 unicast
  neighbor iBGP next-hop-self
 exit-address-family
exit
!
router bgp 65010 vrf orange
 no bgp ebgp-requires-policy
 neighbor 10.30.32.32 remote-as 65032
exit
!
router ospf
exit
!
mpls ldp
 !
 address-family ipv4
  discovery transport-address 10.0.0.30
  !
  interface ens19
  exit
  !
  interface ens20
  exit
  !
 exit-address-family
 !
exit
!
