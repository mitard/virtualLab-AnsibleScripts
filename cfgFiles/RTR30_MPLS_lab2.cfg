frr version 8.4.4
frr defaults traditional
hostname Pod1-RTR30
log syslog informational
service integrated-vtysh-config
!
ip router-id 10.0.0.30
!
interface ens19
 bandwidth 1000
 description toR10
 ip address 10.10.30.30/24
 ip ospf area 0
 ip ospf network point-to-point
exit
!
interface ens20
 bandwidth 1000
 description toR11
 ip address 10.11.30.30/24
 ip ospf area 0
 ip ospf network point-to-point
exit
!
interface ens21
 bandwidth 1000
 description toR31
 ip address 10.30.31.30/24
exit
!
interface ens22
 bandwidth 1000
 description toR32
 ip address 10.30.32.30/24
exit
!
interface lo
 description Systeme
 ip address 10.0.0.30/32
 ip ospf area 0
exit
!
router bgp 65010
 neighbor iBGP peer-group
 neighbor iBGP remote-as 65010
 neighbor iBGP update-source 10.0.0.30
 neighbor 10.0.0.20 peer-group iBGP
 neighbor 10.0.0.40 peer-group iBGP
 !
 address-family ipv4 unicast
  neighbor iBGP next-hop-self
 exit-address-family
exit
!
router ospf
exit
!
