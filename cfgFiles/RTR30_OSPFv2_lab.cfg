frr version 10.6.1
frr defaults traditional
hostname Pod1-RTR30
log syslog informational
service integrated-vtysh-config
!
vrf mgmt-vrf
exit-vrf
!
interface ens19
 description toBackbone
 ip address 10.0.255.30/24
 ip ospf area 0
exit
!
interface ens20
 description toR31
 ip address 10.30.31.30/24
 ip ospf area 3
 ip ospf network point-to-point
exit
!
interface ens21
 description toR32
 ip address 10.30.32.30/24
 ip ospf area 3
 ip ospf network point-to-point
exit
!
interface lo
 description Système
 ip address 10.0.0.30/32
 ip ospf area 3
exit
!
router ospf
 ospf router-id 10.0.0.30
exit
!
