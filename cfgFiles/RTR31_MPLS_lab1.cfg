frr version 8.4.4
frr defaults traditional
hostname Pod1-RTR31
log syslog informational
service integrated-vtysh-config
!
ip router-id 10.0.0.31
!
interface ens19
 bandwidth 1000
 description toR30
 ip address 10.30.31.31/24
exit
!
interface lo
 description Sous-réseau clients R31
 ip address 192.168.31.1/24
exit
!
router bgp 65031
 no bgp ebgp-requires-policy
 neighbor 10.30.31.30 remote-as 65010
 !
 address-family ipv4 unicast
  network 192.168.31.0/24
 exit-address-family
exit
!
