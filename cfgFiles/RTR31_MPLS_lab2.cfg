frr version 10.6.1
frr defaults traditional
hostname Pod1-RTR31
log syslog informational
service integrated-vtysh-config
!
ip route 0.0.0.0/0 10.30.31.30
ip router-id 10.0.0.31
!
vrf mgmt-vrf
exit-vrf
!
interface ens19
 bandwidth 1000
 description toR30
 ip address 10.30.31.31/24
exit
!
interface lo
 description Sous-réseau clients R31
 ip address 192.168.31.1/24
exit
!
