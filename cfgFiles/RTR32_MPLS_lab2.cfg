frr version 10.6.1
frr defaults traditional
hostname Pod1-RTR32
log syslog informational
service integrated-vtysh-config
!
ip route 0.0.0.0/0 10.30.32.30
ip router-id 10.0.0.32
!
vrf mgmt-vrf
exit-vrf
!
interface ens19
 bandwidth 1000
 description toR30
 ip address 10.30.32.32/24
exit
!
interface lo
 description Sous-réseau clients R32
 ip address 192.168.32.1/24
exit
!
