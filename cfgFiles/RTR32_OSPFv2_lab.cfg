frr version 10.6.1
frr defaults traditional
hostname Pod1-RTR32
log syslog informational
service integrated-vtysh-config
!
vrf mgmt-vrf
exit-vrf
!
interface ens19
 description toR30
 ip address 10.30.32.32/24
 ip ospf area 3
 ip ospf network point-to-point
exit
!
interface ens20
 description toR31
 ip address 10.31.32.32/24
 ip ospf area 3
 ip ospf network point-to-point
exit
!
interface lo
 description Adr. système et sous-réseau local simulé
 ip address 10.0.0.32/32
 ip address 10.0.3.129/25
 ip ospf area 3
exit
!
router ospf
 ospf router-id 10.0.0.32
exit
!
