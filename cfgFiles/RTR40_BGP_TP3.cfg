frr version 8.4.4
frr defaults traditional
hostname Pod2-RTR40
log syslog informational
service integrated-vtysh-config
!
ip router-id 10.0.0.40
!
interface ens19
 description toR30
 ip address 10.30.40.40/24
exit
!
interface ens20
 description toR50
 ip address 10.40.50.40/24
exit
!
interface lo
 description loobacks
 ip address 10.0.0.40/32
 ip address 192.168.40.1/24
exit
!
router bgp 65540
 no bgp ebgp-requires-policy
 neighbor 10.30.40.30 remote-as 65530
 neighbor 10.40.50.50 remote-as 65550
 !
 address-family ipv4 unicast
  network 192.168.40.0/24
 exit-address-family
exit
!
