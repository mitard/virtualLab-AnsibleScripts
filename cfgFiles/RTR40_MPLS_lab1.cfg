frr version 8.4.4
frr defaults traditional
hostname Pod1-RTR40
log syslog informational
service integrated-vtysh-config
!
ip router-id 10.0.0.40
!
interface ens19
 bandwidth 1000
 description toR10
 ip address 10.10.40.40/24
 ip ospf area 0
 ip ospf network point-to-point
exit
!
interface ens20
 bandwidth 1000
 description toR11
 ip address 10.11.40.40/24
 ip ospf area 0
 ip ospf network point-to-point
exit
!
interface ens21
 bandwidth 1000
 description toR41
 ip address 10.40.41.40/24
exit
!
interface ens22
 bandwidth 1000
 description toR42
 ip address 10.40.42.40/24
exit
!
interface lo
 description Systeme
 ip address 10.0.0.40/32
 ip ospf area 0
exit
!
router bgp 65010
 no bgp ebgp-requires-policy
 neighbor iBGP peer-group
 neighbor iBGP remote-as 65010
 neighbor iBGP update-source 10.0.0.40
 neighbor 10.0.0.20 peer-group iBGP
 neighbor 10.0.0.30 peer-group iBGP
 neighbor 10.40.41.41 remote-as 65041
 neighbor 10.40.42.42 remote-as 65042
 !
 address-family ipv4 unicast
  neighbor iBGP next-hop-self
 exit-address-family
exit
!
router ospf
exit
!
