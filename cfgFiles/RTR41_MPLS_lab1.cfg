frr version 8.4.4
frr defaults traditional
hostname Pod1-RTR41
log syslog informational
service integrated-vtysh-config
!
ip router-id 10.0.0.41
!
interface ens19
 bandwidth 1000
 description toR40
 ip address 10.40.41.41/24
exit
!
interface lo
 description Sous-réseau clients R41
 ip address 192.168.41.1/24
exit
!
router bgp 65041
 no bgp ebgp-requires-policy
 neighbor 10.40.41.40 remote-as 65010
 !
 address-family ipv4 unicast
  network 192.168.41.0/24
 exit-address-family
exit
!
