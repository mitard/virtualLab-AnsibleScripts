frr version 10.6.1
frr defaults traditional
hostname Pod1-RTR42
log syslog informational
service integrated-vtysh-config
!
ip route 0.0.0.0/0 10.40.42.40
ip router-id 10.0.0.42
!
vrf mgmt-vrf
exit-vrf
!
interface ens19
 bandwidth 1000
 description toR40
 ip address 10.40.42.42/24
exit
!
interface lo
 description Sous-réseau clients R42
 ip address 192.168.42.1/24
exit
!
