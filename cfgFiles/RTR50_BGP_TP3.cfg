frr version 8.4.4
frr defaults traditional
hostname Pod2-RTR50
log syslog informational
service integrated-vtysh-config
!
ip router-id 10.0.0.50
!
interface ens19
 description toR11
 ip address 10.11.50.50/24
exit
!
interface ens20
 description toR40
 ip address 10.40.50.50/24
exit
!
interface lo
 description loopbacks
 ip address 10.0.0.50/24
 ip address 192.168.50.1/24
exit
!
router bgp 65550
 no bgp ebgp-requires-policy
 neighbor 10.11.50.11 remote-as 65510
 neighbor 10.40.50.40 remote-as 65540
 !
 address-family ipv4 unicast
  network 192.168.50.0/24
 exit-address-family
exit
!
